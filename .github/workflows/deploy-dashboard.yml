name: Deploy FWI Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data/processed/**'
      - 'scripts/build_dashboard.py'
      - 'dashboard/**'
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build dashboard data
        run: python scripts/build_dashboard.py

      - name: Verify dashboard files exist
        run: |
          test -f dashboard/data/stations.json
          test -f dashboard/data/fwi_daily.json
          echo "Dashboard data files verified."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
