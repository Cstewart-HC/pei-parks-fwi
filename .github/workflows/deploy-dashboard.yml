# Deploy FWI Dashboard
# Triggered on: push to main (dashboard/ or workflow changes), or manual dispatch
# Updated: 2026-04-20 - Repo renamed to pei-parks-fwi

name: Deploy FWI Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify dashboard files exist
        run: |
          test -f dashboard/data/stations.json
          test -f dashboard/data/fwi_daily.json
          test -f dashboard/data/fwi_forecast.json
          test -f dashboard/data/forecast_meta.json
          echo "Dashboard data files verified (historical + forecast)."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
