# Pre-commit hooks for pea-met-network
# Ensures ralph-state.json stays in sync with git on every commit.

repos:
  - repo: local
    hooks:
      - id: sync-ralph-state
        name: sync ralph-state.json
        entry: python scripts/sync_state.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
